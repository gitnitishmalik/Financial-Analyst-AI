name: FinAnalyzer CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short || echo "No tests yet"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        run: |
          cd frontend
          npm install
          npm run build

  deploy-railway:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to Railway
        run: |
          echo "Install Railway CLI and deploy"
          echo "railway up --service backend"
        # Uncomment when ready:
        # uses: railwayapp/railway-action@v1
        # env:
        #   RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-vercel:
    needs: [test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy frontend to Vercel
        run: echo "Vercel auto-deploys from GitHub — connect repo at vercel.com"
